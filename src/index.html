<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=https://iromashka.ru/app">
  <title>АйРомашка</title>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F0F5F9;color:#1B2A3D;text-align:center}
    .loader{font-size:18px}
    .spinner{width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#27AE60;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Загрузка АйРомашка...</p>
    <p style="font-size:12px;color:#64748B;margin-top:8px">Если не загрузилось — <a href="https://iromashka.ru/app">откройте вручную</a></p>
  </div>
</body>
</html>
