name: Build Desktop + Android App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked
      - name: Build
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked
      - name: Build
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-linux
          path: src-tauri/target/release/bundle/deb/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked
      - name: Build
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
      - name: Generate keystore for release
        working-directory: android
        run: |
          mkdir -p app
          keytool -genkeypair -v -keystore app/iromashka-release.jks -alias iromashka -keyalg RSA -keysize 2048 -validity 10000 -storepass iromashka2026 -keypass iromashka2026 -dname 'CN=iromashka,OU=iromashka,O=iromashka,L=Moscow,ST=Moscow,C=RU'
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-android
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
