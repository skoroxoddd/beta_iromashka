name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/iromashka-release.keystore
          else
            keytool -genkeypair -v \
              -keystore android/app/iromashka-release.keystore \
              -alias iromashka \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass "255Bookmekerka25!!!" \
              -keypass "255Bookmekerka25!!!" \
              -dname "CN=iRomashka, O=IP Romanov, C=RU"
          fi

      - name: Build Release APK + AAB
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD != '' && secrets.KEYSTORE_PASSWORD || '255Bookmekerka25!!!' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || '255Bookmekerka25!!!' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS != '' && secrets.KEY_ALIAS || 'iromashka' }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-aab
          path: android/app/build/outputs/bundle/release/*.aab
