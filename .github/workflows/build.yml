name: Build Desktop + Android App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked
      - name: Build
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked
      - name: Build
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-linux
          path: src-tauri/target/release/bundle/deb/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked
      - name: Build
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Generate Keystore
        run: |
          keytool -genkeypair -v             -keystore android/app/iromashka-release.jks             -alias iromashka             -keyalg RSA             -keysize 2048             -validity 10000             -storepass iromashka2026             -keypass iromashka2026             -dname CN=iromashka.ru, OU=iromashka, O=iromashka, L=Moscow, C=RU
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iromashka-android
          path: android/app/build/outputs/apk/release/*.apk
